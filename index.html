function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function formatValue(val, format) {
  if (val === null || val === undefined || isNaN(val) || val < 0) return '—';
  if (format === 'count' || format === 'years') {
    return val.toLocaleString(undefined, { maximumFractionDigits: val < 100 ? 1 : 0 });
  }
  if (format === 'dollars') return '$' + Math.round(val).toLocaleString();
  if (format === 'pct_of' || format === 'pct_computed') return val.toFixed(1) + '%';
  if (format === 'minutes_computed') return val.toFixed(1) + ' min';
  return val.toLocaleString();
}

function computeIndicator(ind, raw) {
  if (ind.format === 'count' || ind.format === 'dollars' || ind.format === 'years') {
    var v = parseFloat(raw[ind.varCode]);
    if (isNaN(v) || v < 0) return null;
    return v;
  }
  if (ind.format === 'pct_of') {
    var num = parseFloat(raw[ind.varCode]);
    var den = parseFloat(raw[ind.denomVar]);
    if (isNaN(num) || isNaN(den) || den <= 0 || num < 0) return null;
    return (num / den) * 100;
  }
  if (ind.format === 'pct_computed') {
    var sum = 0;
    for (var i = 0; i < ind.numerators.length; i++) {
      var v2 = parseFloat(raw[ind.numerators[i]]);
      if (isNaN(v2) || v2 < 0) return null;
      sum += v2;
    }
    var d2 = parseFloat(raw[ind.denomVar]);
    if (isNaN(d2) || d2 <= 0) return null;
    return (sum / d2) * 100;
  }
  if (ind.format === 'minutes_computed') {
    var agg = parseFloat(raw[ind.varCode]);
    var w = parseFloat(raw[ind.denomVar]);
    if (isNaN(agg) || isNaN(w) || w <= 0 || agg < 0) return null;
    return agg / w;
  }
  return null;
}

function getAllVarCodes(indicators) {
  var set = {};
  for (var i = 0; i < indicators.length; i++) {
    var ind = indicators[i];
    if (ind.varCode) set[ind.varCode] = true;
    if (ind.denomVar) set[ind.denomVar] = true;
    if (ind.numerators) for (var j = 0; j < ind.numerators.length; j++) set[ind.numerators[j]] = true;
  }
  return Object.keys(set);
}

function chunkArray(arr, size) {
  var out = [];
  for (var i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

function fetchCensusData(opts) {
  var vintage = opts.vintage, year = opts.year, geoType = opts.geoType;
  var stateFips = opts.stateFips, countyFips = opts.countyFips, msaCode = opts.msaCode;
  var varCodes = opts.varCodes, apiKey = opts.apiKey;
  var apiBase = VINTAGES[vintage].apiBase;
  var chunks = chunkArray(varCodes, 45);
  var merged = {};
  var nameOut = null;

  function doChunk(chunk, attempt) {
    var vars = ['NAME'].concat(chunk).join(',');
    var url;
    if (geoType === 'us') {
      url = 'https://api.census.gov/data/' + year + '/' + apiBase + '?get=' + vars + '&for=us:1';
    } else if (geoType === 'state') {
      url = 'https://api.census.gov/data/' + year + '/' + apiBase + '?get=' + vars + '&for=state:' + stateFips;
    } else if (geoType === 'county') {
      url = 'https://api.census.gov/data/' + year + '/' + apiBase + '?get=' + vars + '&for=county:' + countyFips + '&in=state:' + stateFips;
    } else if (geoType === 'msa') {
      url = 'https://api.census.gov/data/' + year + '/' + apiBase +
            '?get=' + vars +
            '&for=' + encodeURIComponent('metropolitan statistical area/micropolitan statistical area') + ':' + msaCode;
    } else {
      return Promise.reject(new Error('Unknown geoType: ' + geoType));
    }
    if (apiKey) url += '&key=' + encodeURIComponent(apiKey);

    return fetch(url).then(function(res) {
      if (res.ok) {
        return res.json().then(function(data) {
          if (!Array.isArray(data) || data.length < 2) throw new Error('Empty response');
          var headers = data[0], row = data[1];
          for (var i = 0; i < headers.length; i++) {
            if (headers[i] === 'NAME') { if (!nameOut) nameOut = row[i]; }
            else if (chunk.indexOf(headers[i]) !== -1) merged[headers[i]] = row[i];
          }
        });
      }
      if ((res.status === 429 || res.status >= 500) && attempt < 3) {
        return sleep(400 * attempt).then(function() { return doChunk(chunk, attempt + 1); });
      }
      return res.text().then(function(body) {
        throw new Error('HTTP ' + res.status + ': ' + body.slice(0, 200));
      });
    }).catch(function(ex) {
      if (attempt < 3) {
        return sleep(400 * attempt).then(function() { return doChunk(chunk, attempt + 1); });
      }
      throw ex;
    });
  }

  var p = Promise.resolve();
  chunks.forEach(function(chunk) {
    p = p.then(function() { return doChunk(chunk, 1); }).then(function() { return sleep(80); });
  });
  return p.then(function() { return { name: nameOut, values: merged }; });
}

function toCSV(rows) {
  return rows.map(function(row) {
    return row.map(function(cell) {
      var s = String(cell == null ? '' : cell);
      if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',');
  }).join('\n');
}

function downloadCSV(filename, content) {
  var blob = new Blob([content], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function computeDelta(v1, v2, format) {
  if (v1 === null || v2 === null || v1 === undefined || v2 === undefined) return null;
  var isPct = format === 'pct_of' || format === 'pct_computed';
  if (isPct) return { type: 'pp', value: v2 - v1 };
  if (v1 === 0) return null;
  return { type: 'pct', value: ((v2 - v1) / v1) * 100 };
}

function hasSet(set, key) { return Object.prototype.hasOwnProperty.call(set, key); }

    var startTime = performance.now();
    function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

  var laterYear = showTime ? Math.max(r.yearA, r.yearB) : r.yearA;

  var bars = [];
  for (var idx = 0; idx < userCount; idx++) {
    var g = r.geographies[idx];

        className: 'absolute top-0 bottom-0 pointer-events-none',
        style: { left: natPct + '%', width: '1px', borderLeft: '1px dashed #78716c', zIndex: 1 },
        title: 'National: ' + formatValue(nationalValue, row.indicator.format)
      }) : null,
      e('div', { className: 'space-y-1.5' },
        bars.map(function(b, i) {
          var color = GEO_COLORS[b.colorIdx];
          var pct = (max > 0 && b.value !== null && b.value > 0) ? (b.value / max) * 100 : 0;
          return e('div', { key: i },
            e('div', { className: 'flex items-baseline justify-between mb-0.5 gap-2' },
              e('div', { className: 'flex items-baseline gap-1.5 min-w-0' },
                e('span', { className: 'inline-block w-2 h-2 rounded-sm flex-shrink-0', style: { background: color.bg } }),
                e('div', { className: 'text-[10px] text-stone-700 truncate' },
                  b.label,
                  b.periodLabel ? e('span', { className: 'mono text-stone-400 ml-1.5' }, '· ' + b.periodLabel) : null
                )
              ),
              e('div', { className: 'mono text-[10px] text-stone-900 flex-shrink-0' }, formatValue(b.value, row.indicator.format))
            ),
            e('div', { className: 'h-1.5 bg-stone-100 rounded-sm overflow-hidden relative' },
              e('div', {
                className: 'h-full bar-grow',
                style: { width: pct + '%', background: color.bg, opacity: b.isEarlier ? 0.5 : 1 }
              })
            )
          );
        })
      )
    ),
    natPct !== null ? e('div', { className: 'mt-2 pt-2 border-t hairline flex items-baseline justify-between text-[9px] text-stone-500' },
      e('div', { className: 'flex items-baseline gap-1.5' },
        e('span', { className: 'inline-block w-3 border-t border-dashed border-stone-500' }),
        e('span', null, 'National' + (showTime ? ' (' + laterYear + ')' : ''))
      ),
      e('span', { className: 'mono' }, formatValue(nationalValue, row.indicator.format))
    ) : null
  );
}

// ============================================================================
// HIGHLIGHTS
// ============================================================================

function SummaryHighlights(props) {
  var hl = generateHighlights(props.results);
  if (hl.length === 0) return null;
  return e('div', null,
    e('div', { className: 'flex items-baseline gap-2 mb-3' },
      e('span', { className: 'text-stone-700' }, Icon('sparkles', { size: 14 })),
      e('div', { className: 'mono text-[10px] uppercase tracking-widest text-stone-700' }, 'Highlights'),
      e('div', { className: 'h-px flex-1 bg-stone-200' })
    ),
    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-2' },
      hl.map(function(h, i) {
        return e.apply(null, [ 'div', {
          key: i,
          className: 'border hairline bg-stone-50/70 p-3 rounded-sm text-xs text-stone-800 leading-relaxed'
        } ].concat(h));
      })
    )
  );
}

function generateHighlights(r) {
  var mode = r.mode;
  var allGeos = r.allGeos || r.geographies;
  var userCount = r.userGeoCount != null ? r.userGeoCount : r.geographies.length;
  var userGeos = allGeos.slice(0, userCount);
  var benchmarks = allGeos.slice(userCount);
  var indicatorRows = r.indicatorRows;
  var yearA = r.yearA, yearB = r.yearB;
  var showTime = mode === 'single_over_time' || mode === 'multi_over_time';
  var aIsEarlier = yearA <= (yearB || yearA);
  var earlier = showTime ? Math.min(yearA, yearB) : yearA;
  var later = showTime ? Math.max(yearA, yearB) : yearA;

  function currentValue(row, geoIdx) {
    return showTime
      ? (aIsEarlier ? row.cells[geoIdx + '-b'] : row.cells[geoIdx + '-a'])
      : row.cells[geoIdx + '-a'];
  }

  var usBench = null, usIdx = -1;
  for (var bi = 0; bi < benchmarks.length; bi++) {
    if (benchmarks[bi].type === 'us') { usBench = benchmarks[bi]; usIdx = allGeos.indexOf(usBench); break; }
  }

  function getStateBench(userGeo) {
    if (userGeo.type === 'state') return userGeo;
    if (userGeo.type === 'county') {
      for (var i = 0; i < benchmarks.length; i++) {
        if (benchmarks[i].type === 'state' && benchmarks[i].stateFips === userGeo.stateFips) return benchmarks[i];
      }
    }
    if (userGeo.type === 'msa' && userGeo.msaStateFips && userGeo.msaStateFips.length === 1) {
      for (var j = 0; j < benchmarks.length; j++) {
        if (benchmarks[j].type === 'state' && benchmarks[j].stateFips === userGeo.msaStateFips[0]) return benchmarks[j];
      }
    }
    return null;
  }

  var out = [];

  // National comparisons
  if (usIdx !== -1) {
    var comps = [];
    indicatorRows.forEach(function(row) {
      userGeos.forEach(function(g, idx) {
        var gv = currentValue(row, idx);
        var nv = currentValue(row, usIdx);
        if (gv === null || nv === null || nv === 0) return;
        var isPct = row.indicator.format === 'pct_of' || row.indicator.format === 'pct_computed';
        var diff;
        if (isPct) diff = { type: 'pp', value: gv - nv, absRel: Math.abs(gv - nv) };
        else diff = { type: 'pct', value: ((gv - nv) / nv) * 100, absRel: Math.abs((gv - nv) / nv) };
        comps.push({ row: row, g: g, diff: diff, gv: gv, nv: nv });
      });
    });
    comps.sort(function(a, b) { return b.diff.absRel - a.diff.absRel; });
    var picked = [];
    for (var ci = 0; ci < comps.length && picked.length < 2; ci++) {
      var c = comps[ci];
      var isPct2 = c.diff.type === 'pp';
      var meaningful = isPct2 ? Math.abs(c.diff.value) >= 2 : c.diff.absRel >= 0.05;
      if (!meaningful) continue;
      var dup = false;
      for (var pi = 0; pi < picked.length; pi++) {
        if (picked[pi].row.indicator.id === c.row.indicator.id) { dup = true; break; }
      }
      if (dup) continue;
      picked.push(c);
    }
    picked.forEach(function(c) {
      var higher = c.diff.value > 0;
      var dirWord = higher ? 'higher' : 'lower';
      var magnitude = c.diff.type === 'pp'
        ? Math.abs(c.diff.value).toFixed(1) + ' pp'
        : Math.abs(c.diff.value).toFixed(1) + '%';
      var yearLabel = showTime ? ' (' + later + ')' : '';
      out.push([
        e('span', { key: 'vs', className: 'font-medium' }, 'Versus national: '),
        c.g.name + ' has ',
        e('span', { key: 'ind', className: 'font-medium' }, c.row.indicator.label.toLowerCase()),
        yearLabel + ' ',
        e('span', { key: 'm', className: 'mono' }, magnitude),
        ' ' + dirWord + ' than the US ',
        e('span', { key: 'us', className: 'text-stone-500' },
          '(' + formatValue(c.gv, c.row.indicator.format) + ' vs ' + formatValue(c.nv, c.row.indicator.format) + ')'),
        '.'
      ]);
    });
  }

  // State comparisons (for counties)
  var countyUsers = userGeos.filter(function(g) { return g.type === 'county'; });
  if (countyUsers.length > 0) {
    var stateComps = [];
    indicatorRows.forEach(function(row) {
      countyUsers.forEach(function(g) {
        var geoIdx = allGeos.indexOf(g);
        var sb = getStateBench(g);
        if (!sb) return;
        var sIdx = allGeos.indexOf(sb);
        var gv = currentValue(row, geoIdx);
        var sv = currentValue(row, sIdx);
        if (gv === null || sv === null || sv === 0) return;
        var isPct = row.indicator.format === 'pct_of' || row.indicator.format === 'pct_computed';
        var diff;
        if (isPct) diff = { type: 'pp', value: gv - sv, absRel: Math.abs(gv - sv) };
        else diff = { type: 'pct', value: ((gv - sv) / sv) * 100, absRel: Math.abs((gv - sv) / sv) };
        stateComps.push({ row: row, g: g, sb: sb, diff: diff, gv: gv, sv: sv });
      });
    });
    stateComps.sort(function(a, b) { return b.diff.absRel - a.diff.absRel; });
    for (var si3 = 0; si3 < stateComps.length; si3++) {
      var sc = stateComps[si3];
      var meaningful2 = sc.diff.type === 'pp' ? Math.abs(sc.diff.value) >= 2 : sc.diff.absRel >= 0.05;
      if (!meaningful2) continue;
      var higher2 = sc.diff.value > 0;
      var dirWord2 = higher2 ? 'higher' : 'lower';
      var magnitude2 = sc.diff.type === 'pp'
        ? Math.abs(sc.diff.value).toFixed(1) + ' pp'
        : Math.abs(sc.diff.value).toFixed(1) + '%';
      out.push([
        e('span', { key: 'vs', className: 'font-medium' }, 'Versus state: '),
        sc.g.name + ' is ',
        e('span', { key: 'm', className: 'mono' }, magnitude2),
        ' ' + dirWord2 + ' on ',
        e('span', { key: 'ind', className: 'font-medium' }, sc.row.indicator.label.toLowerCase()),
        ' than ' + sc.sb.name + ' ',
        e('span', { key: 's', className: 'text-stone-500' },
          '(' + formatValue(sc.gv, sc.row.indicator.format) + ' vs ' + formatValue(sc.sv, sc.row.indicator.format) + ')'),
        '.'
      ]);
      break;
    }
  }

  // Biggest time change
  if (showTime) {
    var biggest = null;
    indicatorRows.forEach(function(row) {
      userGeos.forEach(function(g, idx) {
        var vE = aIsEarlier ? row.cells[idx + '-a'] : row.cells[idx + '-b'];
        var vL = aIsEarlier ? row.cells[idx + '-b'] : row.cells[idx + '-a'];
        var delta = computeDelta(vE, vL, row.indicator.format);
        if (!delta) return;
        if (!biggest || Math.abs(delta.value) > Math.abs(biggest.delta.value)) {
          biggest = { row: row, g: g, delta: delta };
        }
      });
    });
    if (biggest) {
      var dir = biggest.delta.value > 0 ? 'increased' : 'decreased';
      var sign = biggest.delta.value > 0 ? '+' : '';
      var unit = biggest.delta.type === 'pp' ? ' pp' : '%';
      out.push([
        e('span', { key: 'lbl', className: 'font-medium' }, 'Biggest change over time: '),
        e('span', { key: 'ind', className: 'font-medium' }, biggest.row.indicator.label),
        ' in ' + biggest.g.name + ' ' + dir + ' by ',
        e('span', { key: 'v', className: 'mono' }, sign + biggest.delta.value.toFixed(1) + unit),
        ' from ' + earlier + ' to ' + later + '.'
      ]);
    }
  }

  // Largest gap
  if (mode === 'multi_same_year' || mode === 'multi_over_time') {
    var biggestSpread = null;
    indicatorRows.forEach(function(row) {
      var vals = userGeos.map(function(g, idx) {
        return { g: g, v: currentValue(row, idx) };
      }).filter(function(x) { return x.v !== null && x.v !== undefined; });
      if (vals.length < 2) return;
      var sorted = vals.slice().sort(function(a, b) { return b.v - a.v; });
      var top = sorted[0], bot = sorted[sorted.length - 1];
      var spread = top.v - bot.v;
      if (Math.abs(spread) < 0.01) return;
      var rel = Math.abs(spread) / (Math.abs(top.v) || 1);
      if (!biggestSpread || rel > biggestSpread.rel) {
        biggestSpread = { row: row, top: top, bot: bot, spread: spread, rel: rel };
      }
    });
    if (biggestSpread) {
      var y = showTime ? later : yearA;
      out.push([
        e('span', { key: 'lbl', className: 'font-medium' }, 'Largest gap: '),
        'In ' + y + ', ',
        e('span', { key: 'ind', className: 'font-medium' }, biggestSpread.row.indicator.label),
        ' ranged from ',
        e('span', { key: 'b', className: 'mono' }, formatValue(biggestSpread.bot.v, biggestSpread.row.indicator.format)),
        ' in ' + biggestSpread.bot.g.name + ' to ',
        e('span', { key: 't', className: 'mono' }, formatValue(biggestSpread.top.v, biggestSpread.row.indicator.format)),
        ' in ' + biggestSpread.top.g.name + '.'
      ]);
    }
  }

  // Diverging trends
  if (mode === 'multi_over_time') {
    var divergent = null;
    indicatorRows.forEach(function(row) {
      var deltas = userGeos.map(function(g, idx) {
        var vE = aIsEarlier ? row.cells[idx + '-a'] : row.cells[idx + '-b'];
        var vL = aIsEarlier ? row.cells[idx + '-b'] : row.cells[idx + '-a'];
        return { g: g, delta: computeDelta(vE, vL, row.indicator.format) };
      }).filter(function(x) { return x.delta !== null; });
      if (deltas.length < 2) return;
      var hasUp = false, hasDown = false;
      for (var i = 0; i < deltas.length; i++) {
        if (deltas[i].delta.value > 0.5) hasUp = true;
        if (deltas[i].delta.value < -0.5) hasDown = true;
      }
      if (hasUp && hasDown) {
        var vals = deltas.map(function(d) { return d.delta.value; });
        var spread = Math.max.apply(null, vals) - Math.min.apply(null, vals);
        if (!divergent || spread > divergent.spread) {
          divergent = { row: row, spread: spread, deltas: deltas };
        }
      }
    });
    if (divergent) {
      var up = divergent.deltas.filter(function(d) { return d.delta.value > 0; }).map(function(d) { return d.g.name; });
      var down = divergent.deltas.filter(function(d) { return d.delta.value < 0; }).map(function(d) { return d.g.name; });
      out.push([
        e('span', { key: 'lbl', className: 'font-medium' }, 'Diverging trends: '),
        e('span', { key: 'ind', className: 'font-medium' }, divergent.row.indicator.label),
        ' moved in opposite directions — up in ' + up.join(', ') + ' and down in ' + down.join(', ') + '.'
      ]);
    }
  }

  return out;
}

// ============================================================================
// CSV EXPORT
// ============================================================================

function downloadResultsCSV(r) {
  var mode = r.mode;
  var allGeos = r.allGeos || r.geographies;
  var showTime = mode === 'single_over_time' || mode === 'multi_over_time';
  var aIsEarlier = r.yearA <= (r.yearB || r.yearA);
  var earlierYear = showTime ? Math.min(r.yearA, r.yearB) : r.yearA;
  var laterYear = showTime ? Math.max(r.yearA, r.yearB) : r.yearA;

  var header = ['Indicator'];
  allGeos.forEach(function(g) {
    var name = g.isBenchmark ? g.name + ' [ref]' : g.name;
    if (showTime) {
      header.push(name + ' (' + earlierYear + ')');
      header.push(name + ' (' + laterYear + ')');
      header.push(name + ' (change)');
    } else {
      header.push(name + ' (' + r.yearA + ')');
    }
  });

  var rows = [header];
  r.indicatorRows.forEach(function(row) {
    var out = [row.indicator.label];
    allGeos.forEach(function(g, idx) {
      if (showTime) {
        var vE = aIsEarlier ? row.cells[idx + '-a'] : row.cells[idx + '-b'];
        var vL = aIsEarlier ? row.cells[idx + '-b'] : row.cells[idx + '-a'];
        var delta = computeDelta(vE, vL, row.indicator.format);
        out.push(formatValue(vE, row.indicator.format));
        out.push(formatValue(vL, row.indicator.format));
        out.push(delta ? (delta.value.toFixed(1) + (delta.type === 'pp' ? ' pp' : '%')) : '—');
      } else {
        out.push(formatValue(row.cells[idx + '-a'], row.indicator.format));
      }
    });
    rows.push(out);
  });

  downloadCSV('census_compare_' + mode + '_' + Date.now() + '.csv', toCSV(rows));
}

// ============================================================================
// MOUNT
// ============================================================================

try {
  var container = document.getElementById('root');
  var root = ReactDOM.createRoot(container);
  root.render(e(CensusCompare));
} catch (err) {
  console.error('Render error:', err);
  document.getElementById('root').innerHTML =
    '<div style="max-width:640px; margin:80px auto; padding:24px; border:1px solid #1c1917; background:white; font-family:Georgia,serif;">' +
      '<h2 style="margin:0 0 12px 0;">Runtime error</h2>' +
      '<pre style="background:#f5f5f4; padding:12px; font-size:12px; overflow:auto; color:#b91c1c; white-space:pre-wrap;">' +
        (err && err.stack ? err.stack : String(err)) +
      '</pre>' +
    '</div>';
}

})();
</script>
